<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光溺琉璃 | Where light drowns in the glassy ocean.</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000510; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #aabbee;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #aabbee;
            z-index: 10;
        }
    </style>
</head>
<body>

<!-- <div id="info">Tides rise, stars fall into deep blue.<br>Winds cease, a glassy sea comes into view...</div> -->

<!-- Import Map for Three.js Stable Version (r0.160.0) -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- 1. 场景初始化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000510);
    scene.fog = new THREE.FogExp2(0x000510, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 0, 80);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- 2. 控制器 ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.1;
    controls.minDistance = 20;
    controls.maxDistance = 150;

    // --- 3. 着色器定义 ---
    
    const vertexShader = `
        attribute vec3 color;
        varying vec3 vColor;
        uniform float pointSize;
        
        void main() {
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // 透视校正点大小：近大远小，保持视觉一致性
            float size = pointSize * (300.0 / -mvPosition.z);
            gl_PointSize = max(size, 3.0);
        }
    `;

    const fragmentShader = `
        varying vec3 vColor;
        uniform vec3 lightDir;
        
        void main() {
            // 将 gl_PointCoord [0,1] 映射到 [-1,1]，中心为 (0,0)
            vec2 coord = gl_PointCoord * 2.0 - 1.0;
            float dist = length(coord);
            
            // 圆形裁剪：距离大于 1.0 则丢弃（形成圆形边界）
            if (dist > 1.0) discard;
            
            // 构建球体法线：根据 UV 坐标计算半球法线
            // 假设球体朝向相机，z = sqrt(1 - x^2 - y^2)
            float z = sqrt(1.0 - dist * dist);
            vec3 normal = normalize(vec3(coord.x, coord.y, z));
            
            // --- 光照计算 ---
            
            // 1. 环境光 (Ambient)
            vec3 ambient = vColor * 0.4;
            
            // 2. 漫反射 (Diffuse)
            vec3 light = normalize(lightDir);
            float diff = max(dot(normal, light), 0.0);
            vec3 diffuse = vColor * diff * 0.8;
            
            // 3. 高光 (Specular - Phong 模型)
            vec3 viewDir = vec3(0.0, 0.0, 1.0); // 视线朝向相机
            vec3 reflectDir = reflect(-light, normal);
            float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);
            vec3 specular = vec3(1.0) * spec * 0.6; // 白色高光
            
            // 4. 边缘发光 (Fresnel/Rim) - 增强球体感和"光点"效果
            float rim = 1.0 - max(dot(normal, viewDir), 0.0);
            rim = pow(rim, 2.0);
            vec3 rimColor = vColor * 1.2 * rim * 0.5;
            
            // 合成最终颜色
            vec3 finalColor = ambient + diffuse + specular + rimColor;
            
            // Alpha 边缘柔和处理：让球体边缘渐隐而非硬切
            float alpha = 1.0 - smoothstep(0.8, 1.0, dist);
            
            gl_FragColor = vec4(finalColor, alpha);
        }
    `;

    // --- 4. 粒子海洋系统 (The Ocean) ---
    
    const particleCount = 40000;
    const width = 200;
    const depth = 200;
    const spacing = 1.5;

    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const initialPositions = new Float32Array(particleCount * 3);

    // 颜色
    const colorDeep = new THREE.Color(0x001133);
    const colorMid = new THREE.Color(0xaabbcc);
    const colorLight = new THREE.Color(0xaabbee);

    let i = 0;
    for (let x = 0; x < width; x++) {
        for (let z = 0; z < depth; z++) {
            if (i >= particleCount) break;

            const posX = (x - width / 2) * spacing + (Math.random() - 0.5) * 2;
            const posZ = (z - depth / 2) * spacing + (Math.random() - 0.5) * 2;
            const posY = 0;

            positions[i * 3] = posX;
            positions[i * 3 + 1] = posY;
            positions[i * 3 + 2] = posZ;

            initialPositions[i * 3] = posX;
            initialPositions[i * 3 + 2] = posZ;

            colors[i * 3] = colorMid.r;
            colors[i * 3 + 1] = colorMid.g;
            colors[i * 3 + 2] = colorMid.b;

            i++;
        }
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.ShaderMaterial({
        vertexShader: vertexShader,
        fragmentShader: fragmentShader,
        uniforms: {
            pointSize: { value: 0.7 }, // 球体基础大小（像素）
            lightDir: { value: new THREE.Vector3(0.5, 0.8, 0.3).normalize() } // 斜上方光源
        },
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- 5. 波浪动画逻辑 ---

    const clock = new THREE.Clock();

    function updateOcean() {
        const time = clock.getElapsedTime();
        const positions = particles.geometry.attributes.position.array;
        const colors = particles.geometry.attributes.color.array;

        for (let i = 0; i < particleCount; i++) {
            const ix = i * 3;
            const x = initialPositions[ix];
            const z = initialPositions[ix + 2];

            // 核心波浪算法：多重正弦/余弦叠加
            const wave1 = Math.sin(x * 0.05 + time * 0.8) * 4;
            const wave2 = Math.cos(z * 0.03 + time * 0.6) * 4;
            const wave3 = Math.sin((x + z) * 0.1 + time * 1.5) * 1.5;
            const wave4 = Math.cos(x * 0.2 + time * 2.0) * Math.sin(z * 0.2 + time * 1.2) * 0.5;

            const y = wave1 + wave2 + wave3 + wave4;
            positions[ix + 1] = y;

            // 动态颜色混合逻辑
            const normalizedHeight = (y + 6) / 12;
            const mixFactor = Math.max(0, Math.min(1, normalizedHeight));

            let finalColor = new THREE.Color();

            if (mixFactor < 0.5) {
                const localFactor = mixFactor * 2;
                finalColor.lerpColors(colorDeep, colorMid, localFactor);
            } else {
                const localFactor = (mixFactor - 0.5) * 2;
                finalColor.lerpColors(colorMid, colorLight, localFactor);
            }

            // 闪烁微光
            const sparkle = Math.sin(time * 3 + x * 0.5 + z * 0.5);
            if (sparkle > 0.9 && mixFactor > 0.6) {
                finalColor.lerp(new THREE.Color(0xffffff), 0.5);
            }

            colors[ix] = finalColor.r;
            colors[ix + 1] = finalColor.g;
            colors[ix + 2] = finalColor.b;
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
    }

    // --- 6. 后期处理 ---
    
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 1.2;
    bloomPass.radius = 0.3;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- 7. 窗口自适应 ---
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- 8. 动画循环 ---
    function animate() {
        requestAnimationFrame(animate);
        updateOcean();
        controls.update();
        composer.render();
    }

    animate();
</script>
</body>
</html>
